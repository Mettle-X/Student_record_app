<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student_record_project</title>
  </head>
  <body>
    {% extends 'student_record_app/base.html' %} {% block content %}

    <a href="{% url 'student_create' %}" class="">Add Student</a>

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Course</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for student in students %}
        <tr>
          <td>{{ student.first_name }} {{ student.last_name }}</td>
          <td>{{ student.email }}</td>
          <td>{{ student.course }}</td>
          <td>
            <a
              href="{% url 'student_update' student.id %}"
              class="btn btn-warning btn-sm"
              >Edit</a
            >
            <a
              href="{% url 'student_delete' student.id %}"
              class="btn btn-danger btn-sm"
              >Delete</a
            >
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    {% endblock %}
  </body>
</html>
