{% extends 'student_record_app/base.html' %} {% block content %}

<a href="{% url 'student_create' %}">Add Student</a>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Course</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    {% for student in students %}
    <tr>
      <td>{{ student.surname }} {{ student.middle_name }}</td>
      <td>{{ student.email }}</td>
      <td>{{ student.department }}</td>
      <td>
        <a href="{% url 'student_update' student.pk %}">Edit</a>
        <a href="{% url 'student_delete' student.pk %}">Delete</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
